name: Release on main push

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_VERSION: 1.0.0

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: IMEAura-windows-x64
            data_sep: ";"
            app_icon: img/icon.ico
          - os: ubuntu-latest
            artifact_name: IMEAura-linux-x64
            data_sep: ":"
            app_icon: img/icon.ico
          - os: macos-latest
            artifact_name: IMEAura-macos-arm64
            data_sep: ":"
            app_icon: img/icon.icns
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application
        run: >
          python -m PyInstaller --noconsole --onedir
          --icon=${{ matrix.app_icon }}
          --add-data "img/icon.ico${{ matrix.data_sep }}img"
          --add-data "LICENSE${{ matrix.data_sep }}."
          --add-data "THIRD_PARTY_NOTICES.md${{ matrix.data_sep }}."
          --name IMEAura ime_aura/__main__.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/IMEAura/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          (cd dist/IMEAura && zip -r "../../${{ matrix.artifact_name }}.zip" .)

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --keepParent dist/IMEAura.app "${{ matrix.artifact_name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Define release tag
        id: release
        run: |
          echo "tag=v${APP_VERSION}.build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: IME Aura ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          # prerelease: true
          files: artifacts/*.zip
